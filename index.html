<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 명언집</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            /* 초기 배경 스타일 */
            background: linear-gradient(135deg, #74abe2, #5563c1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            transition: background 0.5s ease; /* 배경 바뀔 때 부드럽게 애니메이션 */
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 550px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .quote {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 20px;
            word-break: keep-all;
        }
        .quote::before { content: "“ "; color: #5563c1; font-size: 2rem; }
        .quote::after { content: " ”"; color: #5563c1; font-size: 2rem; }
        
        .author {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }
        /* 버튼 레이아웃 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn {
            background: #5563c1;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(85, 99, 193, 0.3);
        }
        .btn:hover { background: #4350a5; }
        /* 복사 버튼은 다른 색상으로 포인트 */
        .btn-secondary {
            background: #4a5568;
            box-shadow: 0 4px 10px rgba(74, 85, 104, 0.3);
        }
        .btn-secondary:hover { background: #2d3748; }
    </style>
</head>
<body>

    <div class="card">
        <div class="quote" id="quote">로딩 중...</div>
        <div class="author" id="author"></div>
        <div class="btn-group">
            <button class="btn" onclick="nextEverything()">다른 명언 보기</button>
            <button class="btn btn-secondary" onclick="copyQuote()">문구 복사</button>
        </div>
    </div>

    <script>
        const quotes = [
            { text: "삶이 있는 한 희망은 있다.", author: "키케로" },
            { text: "산다는 것 그것은 치열한 전투이다.", author: "로망 로랑" },
            { text: "언제나 현재에 집중할 수 있다면 행복할 것이다.", author: "파울로 코엘료" },
            { text: "피할 수 없으면 즐겨라.", author: "로버트 엘리엇" },
            { text: "행복은 습관이다, 그것을 몸에 지녀라.", author: "허버트 본" },
            { text: "내일은 내일의 태양이 뜬다.", author: "마가렛 미첼" }
        ];

        // 감성적인 그라데이션 색상 모음
        const backgrounds = [
            "linear-gradient(135deg, #74abe2, #5563c1)",
            "linear-gradient(135deg, #a1c4fd, #c2e9fb)",
            "linear-gradient(135deg, #ff9a9e, #fecfef)",
            "linear-gradient(135deg, #f5f7fa, #b8c6db)",
            "linear-gradient(135deg, #84fab0, #8fd3f4)",
            "linear-gradient(135deg, #a8edda, #fed6e3)"
        ];

        // 1. 랜덤 명언 출력 함수
        function randomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('quote').innerText = quotes[randomIndex].text;
            document.getElementById('author').innerText = `- ${quotes[randomIndex].author}`;
        }

        // 2. 랜덤 배경 변경 함수
        function randomBg() {
            const randomIndex = Math.floor(Math.random() * backgrounds.length);
            document.body.style.background = backgrounds[randomIndex];
        }

        // 버튼 누르면 명언과 배경이 동시에 바뀌도록 묶어줌
        function nextEverything() {
            randomQuote();
            randomBg();
        }

        // 3. 클립보드 복사 기능
        function copyQuote() {
            const quoteText = document.getElementById('quote').innerText;
            const authorText = document.getElementById('author').innerText;
            const fullText = `${quoteText} ${authorText}`;

            navigator.clipboard.writeText(fullText).then(() => {
                alert("명언이 복사되었습니다! 필요한 곳에 붙여넣으세요.");
            }).catch(err => {
                alert("복사에 실패했습니다 다시 시도해주세요.");
            });
        }

        // 처음 켤 때 실행
        window.onload = nextEverything;
    </script>
</body>
</html>
