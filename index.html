<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 명언집</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #74abe2, #5563c1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow: hidden;
            padding: 20px;
        }
        /* 메인 명언 카드 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
        }
        /* 즐겨찾기(하트) 표시 버튼 */
        .favorite-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .favorite-toggle-btn:scale(1.1);

        .quote {
            font-size: 1.45rem;
            font-weight: 500;
            line-height: 1.6;
            margin: 20px 0 15px 0;
            word-break: keep-all;
        }
        .quote::before { content: "“ "; color: #5563c1; font-size: 1.8rem; }
        .quote::after { content: " ”"; color: #5563c1; font-size: 1.8rem; }
        
        .author {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }
        /* 버튼 레이아웃 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background: #5563c1;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(85, 99, 193, 0.2);
        }
        .btn:hover { background: #4350a5; }
        .btn-secondary { background: #4a5568; box-shadow: 0 4px 10px rgba(74, 85, 104, 0.2); }
        .btn-secondary:hover { background: #2d3748; }
        .btn-accent { background: #2b6cb0; }
        .btn-accent:hover { background: #2c5282; }

        /* 팝업 창 (모달) 스타일 - 추가하기 / 즐겨찾기 공용 */
        .modal {
            display: none; /* 평소에는 숨김 */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2d3748;
            text-align: center;
        }
        /* 입력창 스타일 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-group input {
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #5563c1; }

        /* 즐겨찾기 리스트 스타일 */
        .fav-list {
            max-height: 250px;
            overflow-y: auto;
        }
        .fav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #edf2f7;
            font-size: 0.95rem;
        }
        .fav-item-text { max-width: 85%; word-break: keep-all; }
        .remove-fav-btn { background: none; border: none; color: #e53e3e; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="card">
        <button class="favorite-toggle-btn" onclick="toggleFavorite()" id="heartBtn">🤍</button>
        
        <div class="quote" id="quote">로딩 중...</div>
        <div class="author" id="author"></div>
        
        <div class="btn-group">
            <button class="btn" onclick="nextEverything()">다른 명언 보기</button>
            <button class="btn btn-secondary" onclick="openModal('addModal')">명언 추가하기</button>
            <button class="btn btn-accent" onclick="openModal('favModal')">즐겨찾기 보기</button>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('addModal')">&times;</span>
            <div class="modal-title">📝 새 명언 등록</div>
            <div class="input-group">
                <input type="text" id="inputQuote" placeholder="기억하고 싶은 명언을 적으세요">
                <input type="text" id="inputAuthor" placeholder="저자 또는 출처 (비워두면 '익명')">
                <button class="btn" style="width: 100%; margin-top: 10px;" onclick="addQuote()">내가 적은 명언 추가하기</button>
            </div>
        </div>
    </div>

    <div id="favModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('favModal')">&times;</span>
            <div class="modal-title">❤️ 내가 즐겨찾기한 명언</div>
            <div class="fav-list" id="favList"></div>
        </div>
    </div>

    <script>
        // 기본 제공 명언
        const defaultQuotes = [
            { text: "삶이 있는 한 희망은 있다.", author: "키케로" },
            { text: "산다는 것 그것은 치열한 전투이다.", author: "로망 로랑" },
            { text: "언제나 현재에 집중할 수 있다면 행복할 것이다.", author: "파울로 코엘료" },
            { text: "피할 수 없으면 즐겨라.", author: "로버트 엘리엇" }
        ];

        const backgrounds = [
            "linear-gradient(135deg, #74abe2, #5563c1)",
            "linear-gradient(135deg, #a1c4fd, #c2e9fb)",
            "linear-gradient(135deg, #ff9a9e, #fecfef)",
            "linear-gradient(135deg, #84fab0, #8fd3f4)"
        ];

        let allQuotes = [];       // 전체 명언 리스트
        let favoriteQuotes = [];  // 하트 누른 즐겨찾기 리스트
        let currentQuote = null;  // 현재 화면에 출출된 명언

        // 데이터 초기 로드
        function initData() {
            const savedAll = localStorage.getItem('allQuotes');
            const savedFav = localStorage.getItem('favoriteQuotes');

            if (savedAll) {
                allQuotes = JSON.parse(savedAll);
            } else {
                allQuotes = [...defaultQuotes];
                localStorage.setItem('allQuotes', JSON.stringify(allQuotes));
            }

            if (savedFav) {
                favoriteQuotes = JSON.parse(savedFav);
            } else {
                favoriteQuotes = [];
                localStorage.setItem('favoriteQuotes', JSON.stringify(favoriteQuotes));
            }
        }

        // 팝업 열기/닫기
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if(id === 'favModal') renderFavorites();
        }
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // 새 명언 추가 (작성 후 자동 팝업 닫힘)
        function addQuote() {
            const qInput = document.getElementById('inputQuote');
            const aInput = document.getElementById('inputAuthor');

            if (!qInput.value.trim()) {
                alert("명언 내용을 입력해주세요!");
                return;
            }

            const newQuote = {
                text: qInput.value.trim(),
                author: aInput.value.trim() || "익명"
            };

            allQuotes.unshift(newQuote);
            localStorage.setItem('allQuotes', JSON.stringify(allQuotes));

            // 등록한 명언을 메인 화면에 띄우기
            currentQuote = newQuote;
            document.getElementById('quote').innerText = newQuote.text;
            document.getElementById('author').innerText = `- ${newQuote.author}`;
            checkHeartStatus();

            qInput.value = "";
            aInput.value = "";
            closeModal('addModal');
            alert("명언이 새로 등록되었습니다!");
        }

        // 메인 화면 하트 토글 (즐겨찾기 추가/해제)
        function toggleFavorite() {
            if(!currentQuote) return;

            const index = favoriteQuotes.findIndex(q => q.text === currentQuote.text);
            
            if(index > -1) {
                // 이미 있으면 제거
                favoriteQuotes.splice(index, 1);
            } else {
                // 없으면 추가
                favoriteQuotes.push(currentQuote);
            }
            
            localStorage.setItem('favoriteQuotes', JSON.stringify(favoriteQuotes));
            checkHeartStatus();
        }

        // 현재 명언이 즐겨찾기 상태인지 판단해서 하트 변경
        function checkHeartStatus() {
            if(!currentQuote) return;
            const isFav = favoriteQuotes.some(q => q.text === currentQuote.text);
            document.getElementById('heartBtn').innerText = isFav ? "❤️" : "🤍";
        }

        // 즐겨찾기 팝업 내부에 리스트 그리기
        function renderFavorites() {
            const favListDiv = document.getElementById('favList');
            favListDiv.innerHTML = "";

            if(favoriteQuotes.length === 0) {
                favListDiv.innerHTML = "<div style='color:#999; text-align:center; padding:20px;'>즐겨찾기한 명언이 없습니다. 하트를 눌러보세요!</div>";
                return;
            }

            favoriteQuotes.forEach((q, index) => {
                const item = document.createElement('div');
                item.className = 'fav-item';
                item.innerHTML = `
                    <span class="fav-item-text">"${q.text}" <strong>-${q.author}</strong></span>
                    <button class="remove-fav-btn" onclick="removeFavorite(${index})">×</button>
                `;
                favListDiv.appendChild(item);
            });
        }

        // 즐겨찾기 목록창에서 바로 삭제
        function removeFavorite(index) {
            favoriteQuotes.splice(index, 1);
            localStorage.setItem('favoriteQuotes', JSON.stringify(favoriteQuotes));
            renderFavorites();
            checkHeartStatus();
        }

        // 다른 명언 보기 (랜덤)
        function nextEverything() {
            if (allQuotes.length === 0) {
                document.getElementById('quote').innerText = "등록된 명언이 없습니다.";
                document.getElementById('author').innerText = "";
                currentQuote = null;
                return;
            }
            const randomIndex = Math.floor(Math.random() * allQuotes.length);
            currentQuote = allQuotes[randomIndex];

            document.getElementById('quote').innerText = currentQuote.text;
            document.getElementById('author').innerText = `- ${currentQuote.author}`;
            
            checkHeartStatus();

            const randomBgIndex = Math.floor(Math.random() * backgrounds.length);
            document.body.style.background = backgrounds[randomBgIndex];
        }

        // 시작할 때
        window.onload = function() {
            initData();
            nextEverything();
        };
    </script>
</body>
</html>
